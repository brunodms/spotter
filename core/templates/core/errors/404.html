{% extends "core/base.html" %}

{% block title %}Página Não Encontrada{% endblock %}

{% block content %}
<div class="container page-inner text-center py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <h1 class="display-1 fw-bold text-muted mb-3" style="font-size: 8rem; opacity: 0.2;">404</h1>
            <h2 class="h3 fw-bold mb-3">Oops! Página não encontrada.</h2>
            <p class="text-secondary mb-4">
                A página que você está procurando pode ter sido removida, mudado de nome, ou está temporariamente indisponível.
            </p>
            <a href="{% url 'core:home' %}" class="btn btn-spotter px-4 py-2">
                Voltar para a Página Inicial
            </a>
        </div>
    </div>
</div>
{% endblock %}
