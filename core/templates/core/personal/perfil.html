{% extends "core/base.html" %}

{% block title %}Meu Perfil{% endblock %}

{% block content %}
<div class="container py-4">
    <h1 class="h3 mb-4">Meu perfil profissional</h1>
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <p class="text-muted small">Avaliação média: <strong>{{ object.avaliacao_media }} ★</strong> (calculada automaticamente)</p>
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {{ field.errors }}
                        </div>
                        {% endfor %}
                        <button type="submit" class="btn-outline-color btn-outline-blue">Salvar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
