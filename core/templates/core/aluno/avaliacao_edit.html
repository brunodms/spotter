{% extends "core/base.html" %}

{% block title %}Editar Avaliação{% endblock %}

{% block content %}
<div class="page-inner">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="form-card">
                    <a href="{% url 'core:aluno_avaliacao_detail' contrato.pk %}" class="text-muted-theme small">&larr; Ver avaliação</a>
                    <h1 class="h4 mt-3 mb-1">Editar avaliação</h1>
                    <p class="text-muted-theme small mb-4">
                        Personal: <strong>{{ contrato.personal.usuario.nome }}</strong>
                    </p>

                    <form method="post" novalidate>
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                            {{ field }}
                            {{ field.errors }}
                        </div>
                        {% endfor %}
                        <div class="d-flex flex-wrap gap-2 mt-4">
                            <button type="submit" class="btn-outline-color btn-outline-blue">Salvar alterações</button>
                            <a href="{% url 'core:aluno_avaliacao_detail' contrato.pk %}" class="btn-outline-color btn-outline-white">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
